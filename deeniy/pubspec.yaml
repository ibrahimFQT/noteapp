name: deeniy

description: A simple Islamic Flutter app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  http: ^1.2.1

  flutter_compass: ^0.8.1

  geolocator: ^11.0.0
  table_calendar: ^3.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  flutter_native_splash: ^2.4.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:

  color: "#1F4E45"

  image: assets/images/deeniy_logo.png

  android: true
  ios: true

  android_12:
    color: "#1F4E45"
    image: assets/images/deeniy_logo.png